app = "telegram-bot--88-aq"
primary_region = "jnb"

[build]
dockerfile = "Dockerfile"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8080
min_machines_running = 0
processes = ["app"]

[[mounts]]
destination = "/data"
initial_size = "1gb"
source = "telegram_bot_data"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 1024
